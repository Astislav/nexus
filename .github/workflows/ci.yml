name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-packages
      - run: uv run ruff check .

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-packages --python ${{ matrix.python }}
      - run: uv run pytest -q

  frozen:
    # The flagship claim — "paths that survive PyInstaller" — proven on a real
    # frozen build USING THE SHIPPED TOOLING, on every OS we claim: scaffold,
    # `nexus-kit freeze`, `nexus-kit build`, then run the executable with .env
    # placed NEXT TO IT (not the cwd) and assert the config actually loaded.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-packages
      - name: Scaffold + freeze + build via the CLI
        shell: bash
        run: |
          uv run nexus-kit new frozen-probe
          cd frozen-probe
          uv run --project .. nexus-kit freeze
          uv run --project .. --with "pyinstaller>=6,<7" nexus-kit build
      - name: Run the executable — .env beside it, cwd elsewhere
        shell: bash
        run: |
          printf 'APP_NAME=frozen-and-loaded\nTICK_SECONDS=0.1\nRUN_SECONDS=1\n' > frozen-probe/dist/.env
          EXE=frozen-probe/dist/frozen-probe
          [ -f "$EXE.exe" ] && EXE="$EXE.exe"
          out="$("$EXE")"
          echo "$out"
          echo "$out" | grep -q "frozen-and-loaded" || { echo "Root.external did not read .env from the executable dir"; exit 1; }
          echo "$out" | grep -q "tick #1" || { echo "ticker did not tick"; exit 1; }
          echo "$out" | grep -q "stopped after" || { echo "lifecycle did not stop cleanly"; exit 1; }
      - name: sync-ai builds the atlas from the app venv, and --check is stable
        # A `nexus-kit` whose OWN environment lacks the satellite must still
        # discover it in the APP's .venv (via the nexus_kit.ai_guides entry
        # point) and write the atlas. The CLI lives in an isolated core-only env;
        # the app carries the satellite in its own .venv.
        shell: bash
        run: |
          TOOLENV="$RUNNER_TEMP/toolenv"
          uv venv "$TOOLENV"
          uv pip install --python "$TOOLENV" ./nexus-kit
          BIN="$TOOLENV/bin/nexus-kit"; [ -f "$BIN" ] || BIN="$TOOLENV/Scripts/nexus-kit"
          uv run nexus-kit new syncprobe
          cd syncprobe
          uv venv
          uv pip install --python .venv "$GITHUB_WORKSPACE/nexus-kit" "$GITHUB_WORKSPACE/nexus-kit-fastapi"
          "$BIN" sync-ai
          test -f .nexus-kit/map.md || { echo "atlas map not written"; exit 1; }
          test -f .nexus-kit/guides/nexus-kit.md || { echo "kernel guide missing from atlas"; exit 1; }
          test -f .nexus-kit/guides/nexus-kit-fastapi.md || { echo "satellite guide missing from atlas"; exit 1; }
          grep -q "nexus-kit-fastapi" .nexus-kit/map.md || { echo "satellite not indexed in the map"; exit 1; }
          "$BIN" sync-ai --check   # a just-generated atlas must be reported up to date
      - name: Windowed build must start and exit cleanly (Windows)
        # console=False means sys.stderr (and stdout) are None — the class of
        # startup crash a console build can never catch. We only assert a
        # clean exit: stdout-to-nowhere is intentional in windowed apps.
        if: runner.os == 'Windows'
        timeout-minutes: 10
        shell: bash
        run: |
          cd frozen-probe
          sed -i 's/console=True,/console=False,/' app.spec
          uv run --project .. --with "pyinstaller>=6,<7" nexus-kit build
          printf 'APP_NAME=windowed\nTICK_SECONDS=0.1\nRUN_SECONDS=1\n' > dist/.env
          ./dist/frozen-probe.exe
